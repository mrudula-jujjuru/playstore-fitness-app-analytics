<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4B43"/>
      <stop offset="100%" stop-color="#143630"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <circle cx="120" cy="120" r="112" fill="url(#bgGrad)"/>
  <circle cx="120" cy="120" r="112" fill="none" stroke="#E8B923" stroke-width="3"/>

  <!-- Pulse / heartbeat line (fitness + data signal motif) -->
  <polyline points="40,130 75,130 90,95 108,165 122,70 138,130 200,130"
            fill="none" stroke="#FAFAF8" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Coral accent dot marking the "signal" peak (risk/attention motif) -->
  <circle cx="122" cy="70" r="7" fill="#FF6B5C"/>

  <!-- Small gold dot marking market/growth accent -->
  <circle cx="200" cy="130" r="6" fill="#E8B923"/>
</svg>
